<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .hidden {
            display: none;
        }

        .capitalize {
            text-transform: capitalize;
        }

        .active {
            background-color: #4a00ff;
            color: white;
        }

        .font {
            font-family: "Geist", sans-serif;
            font-style: normal;
        }

        .demo-divide {
            position: relative;
            text-align: center;

        }

        .demo-divide::before {
            content: "";
            width: 120px;
            height: 2px;
            background-color: #e4e4e7;
            display: block;
            position: absolute;
            top: 50%;
            left: 0;
        }

        .demo-divide::after {
            content: "";
            width: 120px;
            height: 2px;
            background-color: #e4e4e7;
            display: block;
            position: absolute;
            top: 50%;
            right: 0;
        }
    </style>

</head>

<body class="font bg-[#f8fafc]">
    <!-- login Section -->
    <section id="loginSection" class="h-screen flex items-center">
        <fieldset class="fieldset bg-white border-base-300 mx-auto rounded-box w-xs border p-4">
            <div class="mx-auto text-center">
                <img class="ml-18" src="assets/github-logo.png" alt="">
                <h3 class="text-2xl font-semibold">
                    GitHub Issues Tracker
                </h3>
                <p class="text-[#64748b]">
                    Sign in to manage your issues
                </p>
            </div>
            <label class="label font-bold">Username</label>
            <input id="username" type="email" class="input outline-none" placeholder="Enter Username" />

            <label class="label font-bold">Password</label>
            <input id="password" type="password" class="input outline-none" placeholder="Enter Password" />

            <button id="signInBtn" class="btn btn-primary mt-4">Sign In</button>
            <h3 class="demo-divide my-6">OR</h3>
            <div class="text-center space-y-3">
                <h3>Demo Credentials:</h3>
                <div class="bg-[#eaecee] p-5 rounded-lg">
                    <p class="font-semibold">Username: admin</p>
                    <p class="font-semibold">Password: admin123</p>
                </div>
            </div>
        </fieldset>
    </section>

    <div id="dashboard-container" class="hidden">
        <!-- Navbar -->
        <section>
            <div class="navbar bg-base-100 shadow-sm flex justify-between px-7">
                <div class="flex">
                    <img class="w-6 mr-1" src="assets/github-logo.png" alt="">
                    <h2>GitHub Issues Tracker</h2>
                </div>
                <div class="flex gap-2">
                    <input id="input-search" type="text" placeholder="Search Issues..."
                        class="input outline-none input-bordered w-24 md:w-auto" />
                    <button class="btn btn-primary"><i class="fa-solid fa-plus"></i>New Issue</button>
                </div>
            </div>
        </section>

        <!-- Dash Board -->
        <section class="w-11/12 mx-auto">
            <!-- Button -->
            <div class="bg-white mt-10 mb-3 shadow rounded-lg p-4">
                <button id="all-btn" onclick="loadAllIssues()" class="btn active">All</button>
                <button id="open-btn" onclick="loadOpenIssues()" class="btn">Open</button>
                <button id="close-btn" onclick="loadCloseIssues()" class="btn">Close</button>
            </div>

            <div id="loader" class="flex justify-center">
                <span class="loading loading-dots loading-xl"></span>
            </div>

            <div id="card-section">
                <!-- Issues -->
                <div class="bg-white flex p-5 justify-between border 1px border-[#e4e4e7] rounded-t-lg">
                    <div class="flex items-center">
                        <img class="bg-[#ece4ff] rounded-full p-1 mr-2" src="assets/Aperture.png" alt="">
                        <div>
                            <h3><span id="issues-count"></span> Issues</h3>
                            <p>Track and manage your project issues</p>
                        </div>
                    </div>
                    <div class="flex items-center justify-center gap-2">
                        <img class="w-3" src="assets/Open-Status.png" alt="">
                        <h4>Open</h4>
                        <img class="w-3" src="assets/Closed-Status.png" alt="">
                        <h4>Close</h4>
                    </div>
                </div>
                <!-- Cards -->
                <div id="card-container" class="border border-[#e4e4e7] p-4 md:grid grid-cols-4 gap-2 space-y-2">
                </div>
            </div>

            <!-- Open the modal using ID.showModal() method -->
            <dialog id="my_modal_1" class="modal">
                <div class="modal-box">
                    <div id="detailContainer">

                    </div>
                    <div class="modal-action">
                        <form id="modal-form" method="dialog">
                            <!-- if there is a button in form, it will close the modal -->
                            <button class="btn btn-primary">Close</button>
                        </form>
                    </div>
                </div>
            </dialog>

        </section>
    </div>
    <script src="script/login.js"></script>
</body>

</html>
